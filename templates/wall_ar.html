<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Wall AR Multi Panel</title>

<style>

html,body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

/* CAMERA */

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* WALL PANEL */

.wall{
position:absolute;
width:220px;
height:150px;
border-radius:14px;
z-index:5;
cursor:grab;
}

/* DELETE BUTTON */

.deleteBtn{
position:absolute;
top:-10px;
right:-10px;
background:red;
color:white;
width:22px;
height:22px;
border-radius:50%;
text-align:center;
line-height:22px;
font-weight:bold;
cursor:pointer;
}

/* CONTROL PANEL */

#panel{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(40,40,40,.9);
padding:14px;
border-radius:20px;
width:300px;
color:white;
z-index:10;
}

.color{
width:26px;
height:26px;
border-radius:6px;
display:inline-block;
margin:3px;
cursor:pointer;
}

button{
background:#00c2d1;
border:none;
padding:7px 12px;
border-radius:10px;
margin:3px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="panel">

🎨 Wall AR

<input type="color" id="picker">

<br><br>

<div id="palette"></div>

Opacity
<input type="range"
id="opacity"
min="0.2"
max="1"
step="0.1"
value="1">

<br>

<button onclick="addWall()">Add Panel</button>

<input type="file" id="texture">

<button onclick="applyTexture()">Texture</button>

<button onclick="capture()">📸 Capture</button>

</div>

<script>

/* START CAMERA */

navigator.mediaDevices.getUserMedia({
video:{ facingMode:"environment" }
}).then(stream=>camera.srcObject=stream);


/* ACTIVE PANEL */

let selectedWall=null;


/* COLOR PALETTE */

const colors=[
"red","blue","green","yellow",
"white","black","pink",
"orange","purple","cyan"
];

colors.forEach(c=>{

let div=document.createElement("div");

div.className="color";

div.style.background=c;

div.onclick=()=>{

if(selectedWall)
selectedWall.style.background=c;

};

palette.appendChild(div);

});


/* ADD NEW PANEL */

function addWall(){

let wall=document.createElement("div");

wall.className="wall";

wall.style.background=picker.value;

wall.style.top="40%";
wall.style.left="40%";


/* DELETE BUTTON */

let del=document.createElement("div");

del.className="deleteBtn";

del.innerHTML="×";

del.onclick=e=>{
e.stopPropagation();
wall.remove();
};

wall.appendChild(del);


/* SELECT PANEL WHEN CLICKED */

wall.addEventListener("pointerdown",()=>{
selectedWall=wall;
});


document.body.appendChild(wall);

enableGestures(wall);

selectedWall=wall;

}


/* RGB PICKER */

picker.oninput=()=>{

if(selectedWall)
selectedWall.style.background=picker.value;

};


/* OPACITY CONTROL */

opacity.oninput=()=>{

if(selectedWall)
selectedWall.style.opacity=opacity.value;

};


/* TEXTURE APPLY */

function applyTexture(){

let file=texture.files[0];

if(!file || !selectedWall) return;

let reader=new FileReader();

reader.onload=e=>{

selectedWall.style.background =
`url(${e.target.result}) center/cover`;

};

reader.readAsDataURL(file);

}


/* ENABLE PANEL GESTURES */

function enableGestures(el){

let posX=0,posY=0;
let scale=1;
let rotation=0;

let startX,startY;
let dragging=false;

let startDist=0,startAngle=0;


/* UPDATE TRANSFORM */

function update(){

el.style.transform=
`translate(${posX}px,${posY}px)
scale(${scale})
rotate(${rotation}rad)`;

}


/* TOUCH SUPPORT */

el.addEventListener("touchstart",e=>{

selectedWall=el;

if(e.touches.length===1){

dragging=true;

startX=e.touches[0].clientX-posX;
startY=e.touches[0].clientY-posY;

}

if(e.touches.length===2){

startDist=getDistance(e.touches);
startAngle=getAngle(e.touches);

}

},{passive:false});


el.addEventListener("touchmove",e=>{

e.preventDefault();

if(e.touches.length===1 && dragging){

posX=e.touches[0].clientX-startX;
posY=e.touches[0].clientY-startY;

update();

}

if(e.touches.length===2){

let newDist=getDistance(e.touches);

scale*=newDist/startDist;

startDist=newDist;

let newAngle=getAngle(e.touches);

rotation+=newAngle-startAngle;

startAngle=newAngle;

update();

}

},{passive:false});


el.addEventListener("touchend",()=>dragging=false);


/* MOUSE SUPPORT */

el.addEventListener("mousedown",e=>{

selectedWall=el;

dragging=true;

startX=e.clientX-posX;
startY=e.clientY-posY;

});


window.addEventListener("mousemove",e=>{

if(!dragging) return;

posX=e.clientX-startX;
posY=e.clientY-startY;

update();

});


window.addEventListener("mouseup",()=>dragging=false);


/* WHEEL ZOOM */

window.addEventListener("wheel",e=>{

if(selectedWall!==el) return;

scale+=e.deltaY*-0.001;

scale=Math.max(0.3,Math.min(4,scale));

update();

});

}


/* DISTANCE */

function getDistance(t){

return Math.hypot(
t[0].clientX-t[1].clientX,
t[0].clientY-t[1].clientY
);

}


/* ANGLE */

function getAngle(t){

return Math.atan2(
t[1].clientY-t[0].clientY,
t[1].clientX-t[0].clientX
);

}


/* CAPTURE ALL PANELS */

function capture(){

const canvas=document.createElement("canvas");

canvas.width=camera.videoWidth;
canvas.height=camera.videoHeight;

const ctx=canvas.getContext("2d");

/* draw camera frame */

ctx.drawImage(camera,0,0);


/* draw every panel */

document.querySelectorAll(".wall").forEach(wall=>{

const rect=wall.getBoundingClientRect();

const scaleX=canvas.width/window.innerWidth;
const scaleY=canvas.height/window.innerHeight;

ctx.globalAlpha=parseFloat(wall.style.opacity||1);

ctx.fillStyle=getComputedStyle(wall).backgroundColor;

ctx.fillRect(
rect.left*scaleX,
rect.top*scaleY,
rect.width*scaleX,
rect.height*scaleY
);

});


let link=document.createElement("a");

link.download="wall_capture.png";

link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
