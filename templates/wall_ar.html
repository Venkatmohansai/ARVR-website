<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Wall AR</title>

<style>

html,body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

/* CAMERA */

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* WALL OVERLAY */

.wallBox{

position:absolute;
top:45%;
left:35%;

width:260px;
height:180px;

background:red;

border-radius:18px;

touch-action:none;

z-index:5;

}

/* FLOAT PANEL */

#panel{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

background:rgba(60,60,60,.9);

padding:18px;

border-radius:26px;

width:90%;
max-width:420px;

color:white;

z-index:10;

}

/* BUTTON */

button{

background:#00c2d1;

border:none;

padding:10px 16px;

border-radius:12px;

margin:4px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="wall" class="wallBox"></div>


<div id="panel">

<div style="display:flex;justify-content:space-between">

<div>🎨 Wall AR RGB</div>

<input type="color" id="colorPicker" value="#ff0000">

</div>

<br>

<button onclick="applyColor()">Add</button>

<br>

<input type="file" id="textureInput">

<br>

<button onclick="applyTexture()">Texture</button>

<button onclick="deleteWall()">Delete</button>

<button onclick="capture()">📸 Capture</button>

</div>


<script>

/* OPEN BACK CAMERA */

navigator.mediaDevices.getUserMedia({

video:{ facingMode:{ ideal:"environment"} }

})
.then(stream=>{

camera.srcObject=stream;

});


/* SELECT WALL */

const wall=document.getElementById("wall");


/* TRANSFORM VALUES */

let posX=0;
let posY=0;

let scale=1;

let rotation=0;

let dragging=false;

let startX,startY;

let startDist=0;

let startAngle=0;


/* UPDATE POSITION */

function updateTransform(){

wall.style.transform=

`translate(${posX}px,${posY}px)
 scale(${scale})
 rotate(${rotation}rad)`;

}


/* TOUCH START */

wall.addEventListener("touchstart",e=>{

if(e.touches.length===1){

dragging=true;

startX=e.touches[0].clientX-posX;
startY=e.touches[0].clientY-posY;

}

if(e.touches.length===2){

dragging=false;

startDist=getDistance(e.touches);

startAngle=getAngle(e.touches);

}

},{passive:false});


/* TOUCH MOVE */

wall.addEventListener("touchmove",e=>{

e.preventDefault();

if(e.touches.length===1 && dragging){

posX=e.touches[0].clientX-startX;

posY=e.touches[0].clientY-startY;

updateTransform();

}

if(e.touches.length===2){

let newDist=getDistance(e.touches);

scale*=newDist/startDist;

startDist=newDist;

let newAngle=getAngle(e.touches);

rotation+=newAngle-startAngle;

startAngle=newAngle;

updateTransform();

}

},{passive:false});


wall.addEventListener("touchend",()=>{

dragging=false;

});


/* DISTANCE FUNCTION */

function getDistance(t){

return Math.hypot(

t[0].clientX-t[1].clientX,

t[0].clientY-t[1].clientY

);

}


/* ROTATION FUNCTION */

function getAngle(t){

return Math.atan2(

t[1].clientY-t[0].clientY,

t[1].clientX-t[0].clientX

);

}


/* DESKTOP DRAG SUPPORT */

wall.addEventListener("mousedown",e=>{

dragging=true;

startX=e.clientX-posX;

startY=e.clientY-posY;

});


window.addEventListener("mousemove",e=>{

if(!dragging) return;

posX=e.clientX-startX;

posY=e.clientY-startY;

updateTransform();

});


window.addEventListener("mouseup",()=>dragging=false);


/* MOUSE SCROLL ZOOM */

window.addEventListener("wheel",e=>{

scale+=e.deltaY*-0.001;

scale=Math.max(.3,Math.min(5,scale));

updateTransform();

},{passive:false});


/* APPLY COLOR */

function applyColor(){

wall.style.background=colorPicker.value;

}


/* APPLY TEXTURE */

function applyTexture(){

const file=textureInput.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=e=>{

wall.style.background=

`url(${e.target.result}) center/cover`;

};

reader.readAsDataURL(file);

}


/* DELETE WALL */

function deleteWall(){

wall.style.background="transparent";

}


/* SCREENSHOT */

function capture(){

let canvas=document.createElement("canvas");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let ctx=canvas.getContext("2d");

ctx.drawImage(camera,0,0);

ctx.fillStyle=wall.style.background;

ctx.fillRect(300,300,260,180);

let link=document.createElement("a");

link.download="wall_ar_capture.png";

link.href=canvas.toDataURL();

link.click();

}


/* STOP CAMERA PINCH ZOOM */

document.addEventListener("touchmove",function(e){

if(e.scale!==1){

e.preventDefault();

}

},{passive:false});

</script>

</body>
</html>
