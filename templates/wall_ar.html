<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Wall AR PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

html,body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

/* CAMERA */

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* WALL PATCH */

.wall{
position:absolute;
width:260px;
height:180px;
border-radius:16px;
z-index:5;
cursor:grab;
}

/* DELETE BUTTON */

.deleteBtn{
position:absolute;
top:-12px;
right:-12px;
background:red;
color:white;
width:26px;
height:26px;
border-radius:50%;
text-align:center;
line-height:26px;
font-weight:bold;
cursor:pointer;
}

/* CONTROL PANEL */

#panel{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

background:rgba(50,50,50,.9);

padding:18px;
border-radius:24px;

width:90%;
max-width:420px;

color:white;
z-index:10;

}

button{

background:#00c2d1;
border:none;
padding:10px 16px;
border-radius:12px;
margin:4px;
color:white;
cursor:pointer;

}

.color{

width:32px;
height:32px;
display:inline-block;
margin:3px;
border-radius:6px;
cursor:pointer;

}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="panel">

🎨 Wall AR PRO
<input type="color" id="colorPicker">

<br><br>

<div id="palette"></div>

Opacity
<input type="range"
id="opacitySlider"
min="0.1"
max="1"
step="0.05"
value="1">

<br><br>

<button onclick="addWall()">Add Wall</button>

<input type="file" id="textureInput">

<button onclick="applyTexture()">Texture</button>

<button onclick="capture()">📸 Capture</button>

</div>

<script>

/* STOP PAGE ZOOM */

document.addEventListener("gesturestart",e=>e.preventDefault());
document.addEventListener("gesturechange",e=>e.preventDefault());
document.addEventListener("gestureend",e=>e.preventDefault());

document.addEventListener("wheel",e=>{

if(e.ctrlKey) e.preventDefault()

},{passive:false});


/* CAMERA */

navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

}).then(stream=>camera.srcObject=stream);


/* GLOBAL */

let selectedWall=null;


/* COLOR PALETTE */

const colors=[
"red","blue","green","yellow",
"white","black","pink",
"orange","purple","cyan"
];

const palette=document.getElementById("palette");

colors.forEach(c=>{

let div=document.createElement("div");

div.className="color";

div.style.background=c;

div.onclick=()=>{

if(selectedWall){

selectedWall.style.background=c;

colorPicker.value=c;

}

};

palette.appendChild(div);

});


/* CREATE WALL */

function addWall(){

let wall=document.createElement("div");

wall.className="wall";

wall.style.background=colorPicker.value;

wall.style.top="45%";
wall.style.left="40%";


/* DELETE BUTTON */

let del=document.createElement("div");

del.className="deleteBtn";

del.innerHTML="×";

del.onclick=e=>{

e.stopPropagation();

wall.remove();

};

wall.appendChild(del);


document.body.appendChild(wall);

enableGestures(wall);

selectedWall=wall;

}


/* AUTO CREATE FIRST PANEL */

window.onload=addWall;


/* COLOR PICKER */

colorPicker.oninput=()=>{

if(selectedWall)

selectedWall.style.background=colorPicker.value;

};


/* OPACITY */

opacitySlider.oninput=()=>{

if(selectedWall)

selectedWall.style.opacity=opacitySlider.value;

};


/* TEXTURE */

function applyTexture(){

let file=textureInput.files[0];

if(!file||!selectedWall) return;

let reader=new FileReader();

reader.onload=e=>{

selectedWall.style.background=

`url(${e.target.result}) center/cover`;

};

reader.readAsDataURL(file);

}


/* GESTURES ENGINE */

function enableGestures(el){

let posX=0,posY=0;
let scale=1,rotation=0;

let startX,startY;

let dragging=false;


/* DRAG */

el.addEventListener("pointerdown",e=>{

selectedWall=el;

dragging=true;

startX=e.clientX-posX;
startY=e.clientY-posY;

});


window.addEventListener("pointermove",e=>{

if(!dragging) return;

posX=e.clientX-startX;
posY=e.clientY-startY;

update();

});


window.addEventListener("pointerup",()=>dragging=false);


/* ZOOM */

window.addEventListener("wheel",e=>{

if(selectedWall!==el) return;

scale+=e.deltaY*-0.001;

update();

});


/* ROTATE (RIGHT CLICK DRAG) */

el.addEventListener("contextmenu",e=>e.preventDefault());

el.addEventListener("mousedown",e=>{

if(e.button!==2) return;

selectedWall=el;

let start=e.clientX;

function rotateMove(ev){

rotation+=(ev.clientX-start)*0.01;

start=ev.clientX;

update();

}

function stop(){

window.removeEventListener("mousemove",rotateMove);

window.removeEventListener("mouseup",stop);

}

window.addEventListener("mousemove",rotateMove);

window.addEventListener("mouseup",stop);

});


function update(){

el.style.transform=

`translate(${posX}px,${posY}px)
scale(${scale})
rotate(${rotation}rad)`;

}

}


/* CAPTURE ENGINE */

function capture(){

html2canvas(document.body).then(canvas=>{

let link=document.createElement("a");

link.download="wall_capture.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

</body>
</html>
