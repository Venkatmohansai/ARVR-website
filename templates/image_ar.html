<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Sticker AR Viewer</title>

<style>

html, body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

/* CAMERA FEED */

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
pointer-events:none;
}

/* STICKER IMAGE */

#sticker{
position:absolute;
top:40%;
left:40%;
width:220px;
z-index:5;
cursor:grab;
touch-action:none;
}

/* BUTTON BAR */

#controls{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
z-index:20;
}

button{
padding:12px 24px;
margin:6px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<img id="sticker" src="{{ project.file_url }}">

<div id="controls">

<button onclick="capture()">📷 Capture</button>
<button onclick="resetSticker()">🔄 Reset</button>

</div>

<script>

/* =============================
   PREVENT PAGE ZOOM
============================= */

document.addEventListener("wheel", e=>{
e.preventDefault();
},{ passive:false });


/* =============================
   START BACK CAMERA (MOBILE)
   FALLBACK TO WEBCAM (LAPTOP)
============================= */

const camera = document.getElementById("camera");

navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ ideal:"environment" },
width:{ ideal:1920 },
height:{ ideal:1080 }
}

})
.then(stream=>{
camera.srcObject = stream;
})
.catch(()=>{

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
camera.srcObject = stream;
});

});


/* =============================
   STICKER VARIABLES
============================= */

const sticker = document.getElementById("sticker");

let posX = 0;
let posY = 0;
let scale = 1;
let rotation = 0;

let dragging = false;
let startX = 0;
let startY = 0;


/* =============================
   UPDATE TRANSFORM
============================= */

function updateTransform(){

sticker.style.transform =
`translate(${posX}px, ${posY}px)
 scale(${scale})
 rotate(${rotation}rad)`;

}


/* =============================
   MOUSE DRAG (LAPTOP)
============================= */

sticker.addEventListener("mousedown", e=>{

dragging = true;

startX = e.clientX - posX;
startY = e.clientY - posY;

});


window.addEventListener("mousemove", e=>{

if(!dragging) return;

posX = e.clientX - startX;
posY = e.clientY - startY;

updateTransform();

});


window.addEventListener("mouseup", ()=>{

dragging = false;

});


/* =============================
   MOUSE WHEEL ZOOM
============================= */

window.addEventListener("wheel", e=>{

scale += e.deltaY * -0.001;

if(scale < 0.2) scale = 0.2;
if(scale > 5) scale = 5;

updateTransform();

},{ passive:false });


/* =============================
   KEYBOARD ROTATION
============================= */

window.addEventListener("keydown", e=>{

if(e.key === "ArrowLeft") rotation -= 0.1;
if(e.key === "ArrowRight") rotation += 0.1;

updateTransform();

});


/* =============================
   MOBILE TOUCH SUPPORT
============================= */

let startDist = 0;
let startAngle = 0;

sticker.addEventListener("touchstart", e=>{

e.preventDefault();

if(e.touches.length === 1){

dragging = true;

startX = e.touches[0].clientX - posX;
startY = e.touches[0].clientY - posY;

}

if(e.touches.length === 2){

startDist = getDistance(e.touches);
startAngle = getAngle(e.touches);

}

},{ passive:false });


sticker.addEventListener("touchmove", e=>{

e.preventDefault();

if(e.touches.length === 1 && dragging){

posX = e.touches[0].clientX - startX;
posY = e.touches[0].clientY - startY;

updateTransform();

}

if(e.touches.length === 2){

let newDist = getDistance(e.touches);

scale *= newDist / startDist;
startDist = newDist;

let newAngle = getAngle(e.touches);

rotation += newAngle - startAngle;
startAngle = newAngle;

updateTransform();

}

},{ passive:false });


sticker.addEventListener("touchend", ()=>{

dragging = false;

});


function getDistance(t){

let dx = t[0].clientX - t[1].clientX;
let dy = t[0].clientY - t[1].clientY;

return Math.sqrt(dx*dx + dy*dy);

}


function getAngle(t){

return Math.atan2(
t[1].clientY - t[0].clientY,
t[1].clientX - t[0].clientX
);

}


/* =============================
   RESET BUTTON
============================= */

function resetSticker(){

posX = 0;
posY = 0;
scale = 1;
rotation = 0;

updateTransform();

}


/* =============================
   CAPTURE SCREENSHOT
============================= */

function capture(){

const canvas = document.createElement("canvas");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ctx = canvas.getContext("2d");

/* draw camera */

ctx.drawImage(
camera,
0,
0,
canvas.width,
canvas.height
);

/* draw sticker */

const img = new Image();

img.crossOrigin = "anonymous";
img.src = sticker.src;

img.onload = ()=>{

ctx.save();

ctx.translate(
canvas.width/2 + posX,
canvas.height/2 + posY
);

ctx.rotate(rotation);
ctx.scale(scale, scale);

ctx.drawImage(
img,
-110,
-110,
220,
220
);

ctx.restore();

/* download */

const link = document.createElement("a");

link.download = "sticker_capture.png";
link.href = canvas.toDataURL("image/png");
link.click();

};

}

</script>

</body>
</html>
