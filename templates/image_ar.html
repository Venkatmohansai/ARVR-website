<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>AR Viewer</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
height:100%;
}

/* CAMERA */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:1;
}

/* START BUTTON */

.startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0072ff;
border:none;
padding:18px 60px;
border-radius:50px;
color:white;
font-size:20px;
z-index:3000;
cursor:pointer;
}

/* AR OBJECT */

.arObject{
position:fixed;
width:260px;
border-radius:20px;
z-index:10;
transform:translate(-50%,-50%);
touch-action:none;
cursor:grab;
}

.arObject img{
width:100%;
border-radius:20px;
pointer-events:none;
}

/* SHADOW */

.shadow{
position:absolute;
bottom:-18px;
left:50%;
width:70%;
height:20px;
background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent);
transform:translateX(-50%);
filter:blur(8px);
}

/* CAPTURE BUTTON */

.captureBtn{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#0072ff;
border:none;
padding:16px 60px;
border-radius:50px;
color:white;
font-size:18px;
z-index:2000;
cursor:pointer;
}

/* OPEN IN BROWSER MESSAGE */

.browserBlock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
z-index:9999;
font-size:20px;
}

</style>
</head>

<body>

<div id="browserMessage" class="browserBlock" style="display:none;">
<div>
<h2>Open in Browser</h2>
<p>This AR experience requires camera access.</p>
<p>Please open this link in <b>Chrome, Safari, or Edge</b>.</p>
<p>Tap menu ⋮ → <b>Open in Browser</b></p>
</div>
</div>

<button class="startBtn" id="startAR">Start AR</button>

<video id="cam" autoplay muted playsinline></video>

<div class="arObject" id="object">

<img src="{{ project.file_url }}">

<div class="shadow"></div>

</div>

<button class="captureBtn" id="captureBtn">📸 Capture</button>

<script>

/* DETECT IN-APP BROWSER */

const ua = navigator.userAgent || navigator.vendor || window.opera;

if (ua.includes("FBAN") || ua.includes("FBAV") || ua.includes("Instagram") || ua.includes("WhatsApp")) {

document.getElementById("browserMessage").style.display="flex";

}

/* CAMERA START */

const cam = document.getElementById("cam")

document.getElementById("startAR").onclick = async () => {

try{

const constraints={
video:{
facingMode:{ideal:"environment"}
},
audio:false
}

const stream = await navigator.mediaDevices.getUserMedia(constraints)

cam.srcObject = stream

await cam.play()

document.getElementById("startAR").style.display="none"

}catch(err){

alert("Camera access not supported on this device")

}

}

/* OBJECT STATE */

const object = document.getElementById("object")

let x = window.innerWidth/2
let y = window.innerHeight/2
let scale = 1
let rotation = 0

function update(){

object.style.transform =
`translate(${x}px,${y}px)
 translate(-50%,-50%)
 scale(${scale})
 rotate(${rotation}deg)`

}

update()

/* DRAG */

let dragging=false
let startX=0
let startY=0

object.addEventListener("mousedown",e=>{

dragging=true

startX=e.clientX-x
startY=e.clientY-y

})

document.addEventListener("mousemove",e=>{

if(!dragging)return

x=e.clientX-startX
y=e.clientY-startY

update()

})

document.addEventListener("mouseup",()=>{

dragging=false

})

/* TOUCH DRAG */

object.addEventListener("touchstart",e=>{

if(e.touches.length===1){

dragging=true

startX=e.touches[0].clientX-x
startY=e.touches[0].clientY-y

}

})

object.addEventListener("touchmove",e=>{

if(dragging && e.touches.length===1){

x=e.touches[0].clientX-startX
y=e.touches[0].clientY-startY

update()

}

})

object.addEventListener("touchend",()=>{

dragging=false

})

/* PINCH ZOOM */

let startDistance=0
let startScale=1

function getDistance(a,b){

return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)

}

object.addEventListener("touchstart",e=>{

if(e.touches.length===2){

startDistance=getDistance(e.touches[0],e.touches[1])
startScale=scale

}

})

object.addEventListener("touchmove",e=>{

if(e.touches.length===2){

let newDistance=getDistance(e.touches[0],e.touches[1])

scale=startScale*(newDistance/startDistance)

scale=Math.max(.3,Math.min(scale,4))

update()

}

})

/* DESKTOP ZOOM */

object.addEventListener("wheel",e=>{

e.preventDefault()

scale+=e.deltaY*-0.001

scale=Math.max(.3,Math.min(scale,4))

update()

})

/* CAPTURE SCREENSHOT */

document.getElementById("captureBtn").addEventListener("click",async()=>{

const canvas=document.createElement("canvas")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(cam,0,0,canvas.width,canvas.height)

const arCanvas=await html2canvas(object,{
backgroundColor:null,
useCORS:true
})

const rect=object.getBoundingClientRect()

ctx.drawImage(arCanvas,rect.left,rect.top,rect.width,rect.height)

const link=document.createElement("a")

link.download="AR_capture.png"

link.href=canvas.toDataURL()

link.click()

})

</script>

</body>
</html>
