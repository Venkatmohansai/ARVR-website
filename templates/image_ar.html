<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>AR Viewer</title>

<style>

html,body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

/* CAMERA */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

/* AR PANEL */

#panel{

position:fixed;

top:50%;
left:50%;

width:320px;

transform:translate(-50%,-50%);

border-radius:22px;

box-shadow:
0 60px 200px rgba(0,0,0,.9);

touch-action:none;

}

/* IMAGE */

#panel img{

width:100%;
border-radius:22px;

}

/* BUTTON */

#captureBtn{

position:fixed;

bottom:30px;

left:50%;

transform:translateX(-50%);

padding:14px 40px;

border-radius:40px;

background:#00bcd4;

color:white;

border:none;

font-weight:bold;

cursor:pointer;

}

</style>
</head>

<body>

<video id="cam" autoplay playsinline muted></video>

<div id="panel">
<img id="arImage"
src="{{ project.file_url }}"
crossorigin="anonymous">
</div>

<button id="captureBtn">📸 Capture</button>


<script>

/* START CAMERA */

const cam=document.getElementById("cam");

navigator.mediaDevices.getUserMedia({

video:{ facingMode:"environment" }

}).then(stream=>{

cam.srcObject=stream;

});


/* TRANSFORM VARIABLES */

const panel=document.getElementById("panel");

let x=0,y=0;
let scale=1;
let rotation=0;

let startX,startY,startDist,startAngle;


/* UPDATE TRANSFORM */

function update(){

panel.style.transform=`
translate(calc(-50% + ${x}px),
calc(-50% + ${y}px))
scale(${scale})
rotate(${rotation}deg)
`;

}


/* DRAG */

panel.onmousedown=e=>{

startX=e.clientX-x;
startY=e.clientY-y;

document.onmousemove=e=>{

x=e.clientX-startX;
y=e.clientY-startY;

update();

};

document.onmouseup=()=>document.onmousemove=null;

};


/* ZOOM */

panel.onwheel=e=>{

e.preventDefault();

scale+=e.deltaY*-0.0015;

scale=Math.max(.3,Math.min(scale,4));

update();

};


/* TOUCH START */

panel.addEventListener("touchstart",e=>{

if(e.touches.length===1){

startX=e.touches[0].clientX-x;
startY=e.touches[0].clientY-y;

}

if(e.touches.length===2){

startDist=getDistance(e);
startAngle=getAngle(e);

}

},{passive:false});


/* TOUCH MOVE */

panel.addEventListener("touchmove",e=>{

e.preventDefault();

if(e.touches.length===1){

x=e.touches[0].clientX-startX;
y=e.touches[0].clientY-startY;

}

if(e.touches.length===2){

let newDist=getDistance(e);

scale*=newDist/startDist;

startDist=newDist;

let newAngle=getAngle(e);

rotation+=newAngle-startAngle;

startAngle=newAngle;

}

update();

},{passive:false});


function getDistance(e){

let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;

return Math.sqrt(dx*dx+dy*dy);

}


function getAngle(e){

let dx=e.touches[1].clientX-e.touches[0].clientX;
let dy=e.touches[1].clientY-e.touches[0].clientY;

return Math.atan2(dy,dx)*180/Math.PI;

}


/* REAL CAPTURE ENGINE */

document.getElementById("captureBtn").onclick=async function(){

const canvas=document.createElement("canvas");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const ctx=canvas.getContext("2d");


/* DRAW CAMERA FRAME */

ctx.drawImage(cam,0,0,canvas.width,canvas.height);


/* DRAW AR IMAGE */

const img=document.getElementById("arImage");

const rect=panel.getBoundingClientRect();

ctx.save();

ctx.translate(
rect.left + rect.width/2,
rect.top + rect.height/2
);

ctx.rotate(rotation*Math.PI/180);

ctx.scale(scale,scale);

ctx.drawImage(
img,
-rect.width/2,
-rect.height/2,
rect.width,
rect.height
);

ctx.restore();


/* DOWNLOAD */

const link=document.createElement("a");

link.download="AR_capture.png";

link.href=canvas.toDataURL("image/png");

link.click();

};

</script>

</body>
</html>
