```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>AR Viewer</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
height:100%;
}

/* CAMERA */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:1;
}

/* START BUTTON */

.startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0072ff;
border:none;
padding:18px 60px;
border-radius:50px;
color:white;
font-size:20px;
z-index:3000;
cursor:pointer;
}

/* AR OBJECT */

.arObject{
position:fixed;
width:260px;
border-radius:20px;
z-index:10;
transform:translate(-50%,-50%);
touch-action:none;
cursor:grab;
}

.arObject img{
width:100%;
border-radius:20px;
pointer-events:none;
}

/* SHADOW */

.shadow{
position:absolute;
bottom:-18px;
left:50%;
width:70%;
height:20px;
background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent);
transform:translateX(-50%);
filter:blur(8px);
}

/* CAPTURE BUTTON */

.captureBtn{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#0072ff;
border:none;
padding:16px 60px;
border-radius:50px;
color:white;
font-size:18px;
z-index:2000;
cursor:pointer;
}

</style>
</head>

<body>

<button class="startBtn" id="startAR">Start AR</button>

<video id="cam" autoplay muted playsinline webkit-playsinline></video>

<div class="arObject" id="object">

<img src="{{ project.file_url }}">

<div class="shadow"></div>

</div>

<button class="captureBtn" id="captureBtn">📸 Capture</button>

<script>

/* CAMERA START */

const cam = document.getElementById("cam")

document.getElementById("startAR").onclick = async () => {

try{

let stream

/* Try rear camera first */

try{

stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}},
audio:false
})

}catch(e){

/* Fallback if rear camera not supported */

stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:false
})

}

cam.srcObject = stream

await cam.play()

document.getElementById("startAR").style.display="none"

}catch(err){

alert("Camera access not supported on this device")

}

}

/* OBJECT STATE */

const object = document.getElementById("object")

let x = window.innerWidth/2
let y = window.innerHeight/2
let scale = 1
let rotation = 0

function update(){

object.style.transform =
`translate(${x}px,${y}px)
 translate(-50%,-50%)
 scale(${scale})
 rotate(${rotation}deg)`

}

update()

/* DRAG */

let dragging = false
let startX = 0
let startY = 0

object.addEventListener("mousedown",e=>{

dragging = true

startX = e.clientX - x
startY = e.clientY - y

})

document.addEventListener("mousemove",e=>{

if(!dragging) return

x = e.clientX - startX
y = e.clientY - startY

update()

})

document.addEventListener("mouseup",()=>{

dragging = false

})

/* TOUCH DRAG */

object.addEventListener("touchstart",e=>{

if(e.touches.length === 1){

dragging = true

startX = e.touches[0].clientX - x
startY = e.touches[0].clientY - y

}

})

object.addEventListener("touchmove",e=>{

if(dragging && e.touches.length === 1){

x = e.touches[0].clientX - startX
y = e.touches[0].clientY - startY

update()

}

})

object.addEventListener("touchend",()=>{

dragging = false

})

/* PINCH ZOOM + ROTATE */

let startDistance = 0
let startScale = 1
let startAngle = 0
let startRotation = 0

function getDistance(a,b){

return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)

}

function getAngle(a,b){

return Math.atan2(b.clientY-a.clientY,b.clientX-a.clientX)*180/Math.PI

}

object.addEventListener("touchstart",e=>{

if(e.touches.length === 2){

startDistance = getDistance(e.touches[0],e.touches[1])
startScale = scale
startAngle = getAngle(e.touches[0],e.touches[1])
startRotation = rotation

}

})

object.addEventListener("touchmove",e=>{

if(e.touches.length === 2){

let newDistance = getDistance(e.touches[0],e.touches[1])

scale = startScale * (newDistance/startDistance)

let newAngle = getAngle(e.touches[0],e.touches[1])

rotation = startRotation + (newAngle-startAngle)

scale = Math.max(.3,Math.min(scale,4))

update()

}

})

/* DESKTOP ZOOM */

object.addEventListener("wheel",e=>{

e.preventDefault()

scale += e.deltaY * -0.001

scale = Math.max(.3,Math.min(scale,4))

update()

})

/* CAPTURE SCREENSHOT */

document.getElementById("captureBtn").addEventListener("click",async()=>{

const canvas=document.createElement("canvas")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(cam,0,0,canvas.width,canvas.height)

const arCanvas=await html2canvas(object,{
backgroundColor:null,
useCORS:true
})

const rect=object.getBoundingClientRect()

ctx.drawImage(arCanvas,rect.left,rect.top,rect.width,rect.height)

const link=document.createElement("a")

link.download="AR_capture.png"

link.href=canvas.toDataURL()

link.click()

})

</script>

</body>
</html>
