
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create AR Project</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* PARTICLES */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* BODY */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 18s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CARD */

.create-card{
width:460px;
padding:40px;
border-radius:22px;
background:rgba(30,41,59,.75);
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* TITLE */

.title{
font-size:24px;
text-align:center;
margin-bottom:25px;
color:#22c55e;
}

/* INPUT */

.form-control,
.form-select{
background:#0f172a;
border:none;
color:white;
}

/* UPLOAD */

.upload-box{
border:2px dashed rgba(255,255,255,.2);
border-radius:14px;
padding:35px;
text-align:center;
margin-bottom:20px;
cursor:pointer;
transition:.3s;
}

.upload-box:hover{
border-color:#06b6d4;
background:rgba(6,182,212,.05);
}

/* PREVIEW */

.preview{
width:100%;
max-height:200px;
object-fit:contain;
margin-top:15px;
display:none;
border-radius:10px;
}

.model-icon{
font-size:70px;
display:none;
margin-top:10px;
}

/* PROGRESS */

.progress{
height:8px;
background:#1e293b;
border-radius:10px;
margin-top:15px;
display:none;
}

.progress-bar{
background:linear-gradient(90deg,#06b6d4,#22c55e);
}

/* BUTTON */

.create-btn{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#06b6d4,#22c55e);
color:white;
font-weight:600;
box-shadow:0 0 20px rgba(6,182,212,.5);
}

/* BACK */

.back-btn{
position:absolute;
top:20px;
left:20px;
color:#94a3b8;
text-decoration:none;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<a href="/" class="back-btn">⬅ Back</a>

<div class="create-card">

<h3 class="title">🚀 Create AR Project</h3>

<form id="uploadForm" action="/save" method="POST" enctype="multipart/form-data">

<input 
name="name"
class="form-control mb-3"
placeholder="Project Name"
required>

<select name="type" class="form-select mb-3">

<option value="model">🧊 3D AR Model</option>
<option value="image">🖼 Image AR</option>

</select>

<label class="upload-box">

📂 Drag & Drop or Click to Upload

<input
type="file"
name="file"
id="fileInput"
hidden
required>

<img id="preview" class="preview">

<div id="modelIcon" class="model-icon">
🧊
</div>

</label>

<div class="progress">
<div class="progress-bar" style="width:0%"></div>
</div>

<button class="create-btn">
Create Project
</button>

</form>

</div>

<script>

/* FILE PREVIEW */

const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");
const modelIcon=document.getElementById("modelIcon");

fileInput.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

preview.style.display="none";
modelIcon.style.display="none";

if(file.type.startsWith("image")){

preview.src=URL.createObjectURL(file);
preview.style.display="block";

}

else if(file.name.endsWith(".glb")){

modelIcon.style.display="block";

}

});

/* PROGRESS BAR */

const form=document.getElementById("uploadForm");
const progress=document.querySelector(".progress");
const bar=document.querySelector(".progress-bar");

form.addEventListener("submit",function(){

progress.style.display="block";

let width=0;

let interval=setInterval(()=>{

width+=5;
bar.style.width=width+"%";

if(width>=100){
clearInterval(interval);
}

},100);

});

/* PARTICLES */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,.3)";
ctx.fill();

p.y+=0.3;

if(p.y>canvas.height)p.y=0;

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
